name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build tokens
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node scripts/build.mjs

      - name: Verify dist output
        run: |
          for f in dist/index.css dist/colors.css dist/dimensions.css dist/typography.css dist/effects.css dist/tokens.json; do
            if [ ! -f "$f" ]; then
              echo "Missing expected output: $f"
              exit 1
            fi
          done
          echo "All expected dist files present."
